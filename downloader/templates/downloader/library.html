<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - YouTube Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #00d9ff;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .nav-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 10px;
            color: #00d9ff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: rgba(0, 217, 255, 0.1);
            border-color: #00d9ff;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.3);
        }

        .nav-btn.active {
            background: rgba(0, 217, 255, 0.2);
            border-color: #00d9ff;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 2.5rem;
            color: #00d9ff;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(0, 217, 255, 0.3);
        }

        .card-title {
            color: #00d9ff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .refresh-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0a0a0;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .file-download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(0, 217, 255, 0.2);
            transition: all 0.3s ease;
        }

        .file-download-item:hover {
            background: rgba(0, 217, 255, 0.05);
            border-color: rgba(0, 217, 255, 0.4);
        }

        .file-info {
            flex: 1;
            color: #e0e0e0;
        }

        .file-name {
            font-weight: 500;
            color: #00ffaa;
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .file-size {
            font-size: 0.85rem;
            color: #888;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 10px 16px;
            background: linear-gradient(135deg, #00ffaa 0%, #00cc88 100%);
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 170, 0.4);
        }

        .progress-section {
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 193, 7, 0.05);
            border-radius: 15px;
            border: 2px solid rgba(255, 193, 7, 0.3);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .progress-title {
            color: #ffc107;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .progress-status {
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffc107 0%, #ff9800 100%);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .downloading-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }

        .downloading-indicator .hourglass {
            animation: rotate 2s linear infinite;
            font-size: 1rem;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .completed-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(0, 255, 170, 0.15);
            color: #00ffaa;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            border: 1px solid rgba(0, 255, 170, 0.3);
        }

        .pending-file {
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px 10px;
            }

            h1 {
                font-size: 2rem;
            }

            .nav-links {
                flex-direction: column;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }

            .file-download-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .download-btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px 15px;
            }

            .card-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .refresh-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Biblioteca</h1>
            <p class="subtitle">Todos tus archivos descargados en un solo lugar</p>
        </div>

        <div class="nav-links">
            <a href="/" class="nav-btn">
                <span>⬇️</span> Nueva Descarga
            </a>
            <a href="/library/" class="nav-btn active">
                <span>📚</span> Biblioteca
            </a>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="totalFiles">0</div>
                <div class="stat-label">Archivos Descargados</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeDownloads">0</div>
                <div class="stat-label">Descargas Activas</div>
            </div>
        </div>

        <!-- Descargas en Progreso -->
        <div id="activeDownloadsContainer"></div>

        <!-- Archivos Descargados -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">
                    <span>💾</span> Archivos Disponibles
                </h2>
                <button class="refresh-btn" onclick="loadLibraryStatus()">
                    🔄 Actualizar
                </button>
            </div>
            <div id="downloadedFilesList">
                <div class="empty-state">
                    <div class="empty-state-icon">📁</div>
                    <p>Cargando archivos...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let updateInterval = null;

        // Cargar estado de la biblioteca al cargar la página
        document.addEventListener('DOMContentLoaded', function() {
            loadLibraryStatus();
            // Actualizar cada 2 segundos
            updateInterval = setInterval(loadLibraryStatus, 2000);
        });

        async function loadLibraryStatus() {
            try {
                const response = await fetch('/library/status/');
                const data = await response.json();

                if (response.ok) {
                    updateStats(data);
                    updateActiveDownloads(data.active_downloads || []);
                    updateDownloadedFiles(data.files || []);
                } else {
                    console.error('Error al cargar biblioteca:', data.error);
                }
            } catch (error) {
                console.error('Error de conexión:', error);
            }
        }

        function updateStats(data) {
            document.getElementById('totalFiles').textContent = data.total_files || 0;
            document.getElementById('activeDownloads').textContent = data.active_count || 0;
        }

        function updateActiveDownloads(activeDownloads) {
            const container = document.getElementById('activeDownloadsContainer');
            
            if (activeDownloads.length === 0) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            activeDownloads.forEach(download => {
                html += `
                    <div class="card progress-section">
                        <div class="progress-header">
                            <span class="progress-title">⏳ Descargando</span>
                            <span class="progress-status">${download.current}/${download.total} archivos</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${download.progress}%">
                                ${download.progress}%
                            </div>
                        </div>
                        <div id="expected-files-${download.task_id}">
                `;

                // Mostrar archivos esperados
                if (download.expected_files && download.expected_files.length > 0) {
                    download.expected_files.forEach((file, index) => {
                        const isPending = file.status === 'pending';
                        const isDownloading = file.status === 'downloading';
                        const isCompleted = file.status === 'completed';

                        html += `
                            <div class="file-download-item ${isPending ? 'pending-file' : ''}">
                                <div class="file-info">
                                    <div class="file-name">${file.name}</div>
                                </div>
                        `;

                        if (isCompleted && file.downloaded_name) {
                            html += `
                                <a href="/files/download/${file.downloaded_name}/?folder=output" 
                                   class="download-btn" 
                                   download="${file.downloaded_name}">
                                    ⬇ Descargar
                                </a>
                            `;
                        } else if (isDownloading) {
                            html += `
                                <span class="downloading-indicator">
                                    <span class="hourglass">⌛</span>
                                    Descargando...
                                </span>
                            `;
                        } else {
                            html += `
                                <span class="downloading-indicator">
                                    <span class="hourglass">⌛</span>
                                    Pendiente
                                </span>
                            `;
                        }

                        html += `</div>`;
                    });
                }

                html += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function updateDownloadedFiles(files) {
            const container = document.getElementById('downloadedFilesList');
            
            if (files.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <p>No hay archivos descargados todavía</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">
                            <a href="/" style="color: #00d9ff;">Descarga tu primer archivo</a>
                        </p>
                    </div>
                `;
                return;
            }

            let html = '';
            files.forEach(file => {
                html += `
                    <div class="file-download-item">
                        <div class="file-info">
                            <div class="file-name">${file.name}</div>
                            <div class="file-size">${file.size} MB</div>
                        </div>
                        <a href="/files/download/${file.name}/?folder=${file.folder}" 
                           class="download-btn" 
                           download="${file.name}">
                            ⬇ Descargar
                        </a>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Limpiar intervalo al salir de la página
        window.addEventListener('beforeunload', function() {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
        });
    </script>
</body>
</html>
